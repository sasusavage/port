<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Admin — Sasu Isaac Osafo</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263349;
    --border: rgba(255,255,255,0.08);
    --accent: #3b7eff;
    --accent-soft: rgba(59,126,255,0.15);
    --text: #f1f5f9;
    --muted: #94a3b8;
    --danger: #ef4444;
    --danger-soft: rgba(239,68,68,0.12);
    --success: #22c55e;
    --radius: 12px;
  }

  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 1.25rem;
  }
  .login-card h1 { font-size: 1.3rem; font-weight: 700; }
  .login-card p  { color: var(--muted); font-size: 0.88rem; }

  /* ── LAYOUT ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2rem; background: var(--surface);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
  }
  .topbar__brand { font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 0.6rem; }
  .topbar__brand span { color: var(--accent); }

  .main { padding: 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.55rem 1.1rem; border-radius: 8px; font-size: 0.875rem;
    font-weight: 500; cursor: pointer; border: none; transition: all 150ms;
    text-decoration: none;
  }
  .btn--primary { background: var(--accent); color: #fff; }
  .btn--primary:hover { background: #2563eb; }
  .btn--ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn--ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn--danger { background: var(--danger-soft); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
  .btn--danger:hover { background: var(--danger); color: #fff; }
  .btn--sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

  /* ── FORM FIELDS ── */
  .field { display: flex; flex-direction: column; gap: 0.4rem; }
  .field label { font-size: 0.82rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .field input, .field textarea, .field select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.65rem 0.9rem;
    color: var(--text); font-size: 0.9rem; font-family: inherit;
    transition: border-color 150ms; outline: none; width: 100%;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 80px; }
  .tags-input { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.5rem 0.75rem; min-height: 42px; cursor: text; }
  .tags-input:focus-within { border-color: var(--accent); }
  .tag-pill {
    display: inline-flex; align-items: center; gap: 0.3rem;
    background: var(--accent-soft); border: 1px solid rgba(59,126,255,0.3);
    color: #93c5fd; border-radius: 999px; padding: 0.15rem 0.6rem; font-size: 0.78rem;
  }
  .tag-pill button { background: none; border: none; color: inherit; cursor: pointer; font-size: 0.9rem; line-height: 1; padding: 0; }
  .tags-input input[type="text"] {
    border: none; background: transparent; outline: none;
    color: var(--text); font-size: 0.875rem; min-width: 80px; flex: 1; padding: 0;
  }

  /* ── PROJECTS GRID ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .section-header h2 { font-size: 1.1rem; font-weight: 600; }

  .projects-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.25rem;
  }

  .project-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color 200ms;
  }
  .project-card:hover { border-color: rgba(59,126,255,0.3); }

  .project-card__thumb {
    width: 100%; height: 180px; object-fit: cover;
    background: var(--surface2);
  }
  .project-card__thumb--placeholder {
    width: 100%; height: 180px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 2rem;
  }

  .project-card__body { padding: 1rem 1.1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
  .project-card__title { font-weight: 600; font-size: 0.95rem; }
  .project-card__desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; flex: 1; }
  .project-card__tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .project-card__tag {
    font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.5rem;
    border-radius: 999px; background: var(--accent-soft);
    color: #93c5fd; border: 1px solid rgba(59,126,255,0.25);
  }
  .project-card__actions { display: flex; gap: 0.5rem; padding: 0.75rem 1.1rem; border-top: 1px solid var(--border); }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 100; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-backdrop.is-open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 2rem; width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 1.25rem;
  }
  .modal__header { display: flex; align-items: center; justify-content: space-between; }
  .modal__header h3 { font-size: 1.1rem; font-weight: 700; }
  .modal__close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
  .modal__close:hover { color: var(--text); }
  .modal__footer { display: flex; gap: 0.75rem; justify-content: flex-end; padding-top: 0.5rem; }

  /* ── IMAGE UPLOAD ── */
  .upload-area {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 1.5rem; text-align: center; cursor: pointer;
    transition: border-color 200ms, background 200ms;
    color: var(--muted); font-size: 0.875rem;
  }
  .upload-area:hover, .upload-area.drag-over { border-color: var(--accent); background: var(--accent-soft); }
  .upload-area input[type="file"] { display: none; }
  .upload-preview { max-width: 100%; max-height: 160px; border-radius: 8px; margin-top: 0.75rem; display: none; }

  /* ── TOAST ── */
  .toast-stack { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; z-index: 999; }
  .toast {
    padding: 0.75rem 1.2rem; border-radius: 10px; font-size: 0.875rem; font-weight: 500;
    min-width: 220px; max-width: 340px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    animation: slideIn 200ms ease;
  }
  .toast--success { background: #166534; color: #bbf7d0; border: 1px solid #16a34a; }
  .toast--error   { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; }
  @keyframes slideIn { from { opacity:0; transform: translateX(16px); } to { opacity:1; transform: translateX(0); } }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty p { margin-top: 0.5rem; font-size: 0.9rem; }

  /* ── SPINNER ── */
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state { display: flex; align-items: center; justify-content: center; padding: 3rem; gap: 0.75rem; color: var(--muted); }
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div>
      <h1>Portfolio Admin</h1>
      <p>Sasu Isaac Osafo — Dashboard</p>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Username" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••••" autocomplete="current-password" />
    </div>
    <button class="btn btn--primary" id="login-btn">Sign in</button>
    <p id="login-error" style="color:var(--danger);font-size:.85rem;display:none;">Invalid username or password.</p>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────── -->
<div id="app">
  <div class="topbar">
    <div class="topbar__brand">
      &#9670; Portfolio <span>Admin</span>
    </div>
    <div style="display:flex;gap:.75rem;align-items:center;">
      <a class="btn btn--ghost btn--sm" href="/" target="_blank">View site ↗</a>
      <button class="btn btn--ghost btn--sm" id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="section-header">
      <h2>Signature Engagements</h2>
      <button class="btn btn--primary" id="add-btn">+ Add project</button>
    </div>
    <div id="projects-container">
      <div class="loading-state"><div class="spinner"></div> Loading…</div>
    </div>
  </div>
</div>

<!-- ── MODAL ─────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal__header">
      <h3 id="modal-title">Add project</h3>
      <button class="modal__close" id="modal-close">&times;</button>
    </div>

    <div class="field">
      <label>Project title *</label>
      <input type="text" id="f-title" placeholder="e.g. SourceScout AI" />
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="f-desc" placeholder="What does this project do? Who is it for?"></textarea>
    </div>

    <div class="field">
      <label>Project URL</label>
      <input type="url" id="f-url" placeholder="https://yourproject.com" />
    </div>

    <div class="field">
      <label>Tech stack / tags <span style="font-weight:400;text-transform:none;letter-spacing:0">(press Enter or comma to add)</span></label>
      <div class="tags-input" id="tags-input">
        <input type="text" id="tags-raw" placeholder="Python, Flask…" />
      </div>
    </div>

    <div class="field">
      <label>Image</label>
      <div class="upload-area" id="upload-area">
        <input type="file" id="f-image-file" accept="image/*" />
        <div id="upload-placeholder">
          <div style="font-size:1.5rem;margin-bottom:.4rem;">&#128444;</div>
          Click to upload an image, or drag &amp; drop
          <div style="font-size:.78rem;margin-top:.25rem;opacity:.6">PNG, JPG, GIF, WebP</div>
        </div>
        <img id="upload-preview" class="upload-preview" alt="Preview" />
      </div>
      <div style="display:flex;align-items:center;gap:.5rem;margin-top:.5rem;color:var(--muted);font-size:.82rem;">
        <span>— or paste a URL —</span>
      </div>
      <input type="url" id="f-image-url" placeholder="https://example.com/image.png" />
    </div>

    <div class="field">
      <label>Display order <span style="font-weight:400;text-transform:none;letter-spacing:0">(0 = first)</span></label>
      <input type="number" id="f-order" value="0" min="0" />
    </div>

    <div class="modal__footer">
      <button class="btn btn--ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn--primary" id="modal-save">Save project</button>
    </div>
  </div>
</div>

<!-- ── TOASTS ─────────────────────────────────────────────── -->
<div class="toast-stack" id="toasts"></div>

<script>
const API = '';
let editingId = null;
let currentTags = [];

// ── Toast ──────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast--${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Auth ───────────────────────────────────────────────────
['login-user', 'login-pass'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
});

document.getElementById('login-btn').addEventListener('click', async () => {
  const username = document.getElementById('login-user').value.trim();
  const pass     = document.getElementById('login-pass').value;
  const btn      = document.getElementById('login-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/admin/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password: pass }), credentials: 'include'
    });
    const d = await r.json();
    if (d.success) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadProjects();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  } finally {
    btn.textContent = 'Sign in'; btn.disabled = false;
  }
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await fetch(`${API}/api/admin/logout`, { method: 'POST', credentials: 'include' });
  location.reload();
});

// Check existing session on load
(async () => {
  const r = await fetch(`${API}/api/admin/check`, { credentials: 'include' });
  const d = await r.json();
  if (d.authenticated) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadProjects();
  }
})();

// ── Projects ───────────────────────────────────────────────
async function loadProjects() {
  const container = document.getElementById('projects-container');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading…</div>';
  const r = await fetch(`${API}/api/admin/projects`, { credentials: 'include' });
  const projects = await r.json();
  renderProjects(projects);
}

function renderProjects(projects) {
  const container = document.getElementById('projects-container');
  if (!projects.length) {
    container.innerHTML = '<div class="empty"><div style="font-size:2.5rem">📂</div><p>No projects yet. Add your first one!</p></div>';
    return;
  }
  container.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'projects-grid';
  projects.forEach(p => grid.appendChild(buildCard(p)));
  container.appendChild(grid);
}

function buildCard(p) {
  const card = document.createElement('div');
  card.className = 'project-card';
  card.dataset.id = p.id;

  const imgHtml = p.image_url
    ? `<img class="project-card__thumb" src="${p.image_url}" alt="${p.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="project-card__thumb--placeholder" style="display:none">🖼</div>`
    : `<div class="project-card__thumb--placeholder">🖼</div>`;

  const tagsHtml = (p.tags || []).map(t => `<span class="project-card__tag">${t}</span>`).join('');

  card.innerHTML = `
    ${imgHtml}
    <div class="project-card__body">
      <div class="project-card__title">${p.title}</div>
      <div class="project-card__desc">${p.description || '<em style="opacity:.5">No description</em>'}</div>
      ${tagsHtml ? `<div class="project-card__tags">${tagsHtml}</div>` : ''}
      ${p.project_url ? `<a href="${p.project_url}" target="_blank" rel="noopener" style="font-size:.8rem;color:var(--accent);margin-top:.25rem;display:inline-block;">${p.project_url} ↗</a>` : ''}
    </div>
    <div class="project-card__actions">
      <button class="btn btn--ghost btn--sm edit-btn">✏️ Edit</button>
      <button class="btn btn--danger btn--sm delete-btn">🗑 Delete</button>
    </div>`;

  card.querySelector('.edit-btn').addEventListener('click', () => openEdit(p));
  card.querySelector('.delete-btn').addEventListener('click', () => confirmDelete(p));
  return card;
}

// ── Tags input ─────────────────────────────────────────────
function renderTags() {
  const container = document.getElementById('tags-input');
  container.querySelectorAll('.tag-pill').forEach(el => el.remove());
  const input = document.getElementById('tags-raw');
  currentTags.forEach(tag => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = `${tag} <button type="button" data-tag="${tag}">&times;</button>`;
    pill.querySelector('button').addEventListener('click', () => {
      currentTags = currentTags.filter(t => t !== tag);
      renderTags();
    });
    container.insertBefore(pill, input);
  });
}

document.getElementById('tags-input').addEventListener('click', () => {
  document.getElementById('tags-raw').focus();
});

document.getElementById('tags-raw').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addTag(e.target.value);
  }
  if (e.key === 'Backspace' && !e.target.value && currentTags.length) {
    currentTags.pop();
    renderTags();
  }
});

document.getElementById('tags-raw').addEventListener('blur', e => {
  if (e.target.value.trim()) addTag(e.target.value);
});

function addTag(val) {
  const tag = val.trim().replace(/,/g, '');
  if (tag && !currentTags.includes(tag)) {
    currentTags.push(tag);
    renderTags();
  }
  document.getElementById('tags-raw').value = '';
}

// ── Image upload ───────────────────────────────────────────
let uploadedImageUrl = null;

const uploadArea = document.getElementById('upload-area');
const fileInput  = document.getElementById('f-image-file');
const preview    = document.getElementById('upload-preview');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  const fd = new FormData();
  fd.append('image', file);
  uploadArea.querySelector('#upload-placeholder').textContent = 'Uploading…';
  try {
    const r = await fetch(`${API}/api/admin/upload`, { method: 'POST', body: fd, credentials: 'include' });
    const d = await r.json();
    if (d.url) {
      uploadedImageUrl = d.url;
      document.getElementById('f-image-url').value = d.url;
      preview.src = d.url;
      preview.style.display = 'block';
      document.getElementById('upload-placeholder').innerHTML = '✅ Uploaded';
    } else {
      toast(d.error || 'Upload failed', 'error');
      resetUploadArea();
    }
  } catch {
    toast('Upload failed', 'error');
    resetUploadArea();
  }
}

function resetUploadArea() {
  document.getElementById('upload-placeholder').innerHTML = `<div style="font-size:1.5rem;margin-bottom:.4rem;">🖼</div>Click to upload or drag & drop<div style="font-size:.78rem;margin-top:.25rem;opacity:.6">PNG, JPG, GIF, WebP</div>`;
  preview.style.display = 'none';
  uploadedImageUrl = null;
}

// ── Modal ──────────────────────────────────────────────────
function openModal(title) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal').classList.add('is-open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('is-open');
  editingId = null;
  currentTags = [];
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('f-image-url').value = '';
  document.getElementById('f-order').value = 0;
  document.getElementById('tags-raw').value = '';
  renderTags();
  resetUploadArea();
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

document.getElementById('add-btn').addEventListener('click', () => {
  editingId = null;
  openModal('Add project');
});

function openEdit(p) {
  editingId = p.id;
  document.getElementById('f-title').value   = p.title || '';
  document.getElementById('f-desc').value    = p.description || '';
  document.getElementById('f-url').value     = p.project_url || '';
  document.getElementById('f-image-url').value = p.image_url || '';
  document.getElementById('f-order').value   = p.order_index ?? 0;
  currentTags = [...(p.tags || [])];
  renderTags();
  if (p.image_url) {
    preview.src = p.image_url;
    preview.style.display = 'block';
    document.getElementById('upload-placeholder').innerHTML = '✅ Image set';
  }
  openModal('Edit project');
}

document.getElementById('modal-save').addEventListener('click', async () => {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('Title is required', 'error'); return; }

  // Flush any unsubmitted tag text
  const rawTag = document.getElementById('tags-raw').value.trim();
  if (rawTag) addTag(rawTag);

  const imageUrl = document.getElementById('f-image-url').value.trim();

  const payload = {
    title,
    description: document.getElementById('f-desc').value.trim(),
    project_url: document.getElementById('f-url').value.trim(),
    image_url:   imageUrl,
    tags:        currentTags,
    order_index: parseInt(document.getElementById('f-order').value) || 0,
  };

  const btn = document.getElementById('modal-save');
  btn.textContent = 'Saving…'; btn.disabled = true;

  try {
    const url    = editingId ? `${API}/api/admin/projects/${editingId}` : `${API}/api/admin/projects`;
    const method = editingId ? 'PUT' : 'POST';
    const r = await fetch(url, {
      method, credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if (r.ok) {
      toast(editingId ? 'Project updated ✓' : 'Project added ✓');
      closeModal();
      loadProjects();
    } else {
      const d = await r.json();
      toast(d.error || 'Save failed', 'error');
    }
  } finally {
    btn.textContent = 'Save project'; btn.disabled = false;
  }
});

// ── Delete ─────────────────────────────────────────────────
function confirmDelete(p) {
  if (!confirm(`Delete "${p.title}"? This cannot be undone.`)) return;
  fetch(`${API}/api/admin/projects/${p.id}`, { method: 'DELETE', credentials: 'include' })
    .then(() => { toast('Project deleted'); loadProjects(); })
    .catch(() => toast('Delete failed', 'error'));
}
</script>
</body>
</html>
